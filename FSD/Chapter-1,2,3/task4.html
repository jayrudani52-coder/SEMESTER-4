    <script>
        const emp=[{"name":"xyz","age":30},
                   {"name":"pqr","age":50},
                   {"name":"mno","age":45}]

        const e=emp.sort(
            (a,b)=>b.age-a.age
        )

        for(i of e){
            console.log(i.name+" "+i.age);
        }

        console.log(
            Math.max(...emp.map(e=>e.age)))
    </script>
